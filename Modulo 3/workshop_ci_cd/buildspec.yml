version: 0.2

phases:
  install:
    commands:
      - cd "Modulo 3/workshop_ci_cd"
      - yarn install

  build:
    commands:
      - yarn build

  post_build:
    commands:
      - aws cloudformation package --template template.yml --s3-bucket $S3Bucket --output-template package.yml

artifacts:
  files:
    - Modulo 3/workshop_ci_cd/package.yml
  discard-paths: true